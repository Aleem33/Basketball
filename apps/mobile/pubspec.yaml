name: tournament_mobile
description: Tenant-aware public and fan basketball tournament application.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  connectivity_plus: ^6.1.4
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.3.1
  go_router: ^15.1.2
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  share_plus: ^11.0.0
  socket_io_client: ^3.1.2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
