name: Backend and shared packages

on:
  push:
    branches: [main]
    paths:
      [
        'apps/api/**',
        'packages/**',
        'pnpm-lock.yaml',
        'package.json',
        '.github/workflows/backend.yml',
      ]
  pull_request:
    paths:
      [
        'apps/api/**',
        'packages/**',
        'pnpm-lock.yaml',
        'package.json',
        '.github/workflows/backend.yml',
      ]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16.9-bookworm
        env:
          POSTGRES_DB: tournament_test
          POSTGRES_USER: tournament_test
          POSTGRES_PASSWORD: test-only-database-password
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U tournament_test -d tournament_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7.4.4-bookworm
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      NODE_ENV: test
      PORT: 4000
      APP_VERSION: ci
      DATABASE_URL: postgresql://tournament_test:test-only-database-password@localhost:5432/tournament_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test-only-access-secret-at-least-thirty-two-characters
      JWT_ISSUER: tournament-platform-test
      JWT_AUDIENCE: tournament-test-clients
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_DAYS: 30
      COOKIE_NAME: tp_refresh
      COOKIE_SECURE: 'false'
      CSRF_SECRET: test-only-csrf-secret-at-least-thirty-two-characters
      TOKEN_ENCRYPTION_KEY: AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=
      TRUSTED_ORIGINS: http://localhost:3000
      ADMIN_WEB_URL: http://localhost:3000
      PUBLIC_API_URL: http://localhost:4000/api/v1
      WEBSOCKET_URL: http://localhost:4000
      SMTP_HOST: localhost
      SMTP_PORT: 2525
      SMTP_SECURE: 'false'
      SMTP_USER: test-only-smtp-user
      SMTP_PASSWORD: test-only-smtp-password
      SMTP_FROM: test@example.invalid
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: tournament-test
      S3_ACCESS_KEY: test-only-minio-user
      S3_SECRET_KEY: test-only-minio-password-value
      S3_FORCE_PATH_STYLE: 'true'
      S3_PUBLIC_BASE_URL: http://localhost:9000/tournament-test
      MAX_UPLOAD_BYTES: 5242880
      NOTIFICATION_PROVIDER: noop
      MOBILE_MINIMUM_VERSION: 1.0.0
      MAINTENANCE_MODE: 'false'
      LOG_LEVEL: warn
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_MAX: 1000
      AUTH_RATE_LIMIT_MAX: 100
      DATA_RETENTION_DAYS: 2555
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0, run_install: false }
      - uses: actions/setup-node@v4
        with: { node-version: 22.17.0, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tournament/api prisma:generate
      - run: pnpm format:check
      - run: pnpm --filter @tournament/api... lint
      - run: pnpm --filter @tournament/api... typecheck
      - run: pnpm --filter @tournament/api prisma:validate
      - run: pnpm --filter @tournament/api prisma:migrate
      - run: pnpm --filter @tournament/api test:coverage
      - run: pnpm --filter @tournament/api test:integration
      - run: pnpm --filter @tournament/api... build
      - run: pnpm --filter @tournament/api openapi:generate
      - name: Ensure generated OpenAPI is committed
        run: git diff --exit-code -- docs/openapi.json
      - name: Upload coverage and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            apps/api/coverage
            apps/api/test-results
          if-no-files-found: ignore
          retention-days: 14
