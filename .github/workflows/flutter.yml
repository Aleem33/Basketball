name: Mobile builds and full-stack Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'apps/api/**'
      - 'apps/admin-web/**'
      - 'packages/**'
      - 'infrastructure/**'
      - 'docker-compose.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'apps/api/**'
      - 'apps/admin-web/**'
      - 'packages/**'
      - 'infrastructure/**'
      - 'docker-compose.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/flutter.yml'

permissions:
  contents: read

concurrency:
  group: mobile-full-stack-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.29.3
  APP_NAME: Tournament Platform

jobs:
  android:
    name: Flutter Android build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Complete deterministic Android scaffolding
        run: flutter create --platforms=android --org=com.client --project-name=tournament_mobile .
      - name: Install Flutter dependencies
        run: flutter pub get
      - name: Format Dart sources in the CI workspace
        run: dart format lib test integration_test
      - name: Analyze Flutter application
        run: flutter analyze --fatal-infos
      - name: Run Flutter unit and widget tests
        run: flutter test --coverage
      - name: Build unsigned Android App Bundle
        run: >-
          flutter build appbundle --release
          --dart-define=API_URL=https://api.example.invalid/api/v1
          --dart-define=WEBSOCKET_URL=https://api.example.invalid/live
          --dart-define=APP_NAME="${APP_NAME}"
      - name: Build Android emulator APK
        run: >-
          flutter build apk --debug
          --dart-define=API_URL=http://10.0.2.2:8080/api/v1
          --dart-define=WEBSOCKET_URL=http://10.0.2.2:8080/live
          --dart-define=APP_NAME="${APP_NAME}"
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds-${{ github.sha }}
          path: |
            apps/mobile/build/app/outputs/bundle/release/*.aab
            apps/mobile/build/app/outputs/flutter-apk/app-debug.apk
            apps/mobile/coverage/lcov.info
          if-no-files-found: error
          retention-days: 14

  ios:
    name: Flutter iOS build on macOS
    runs-on: macos-15
    timeout-minutes: 50
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Complete deterministic iOS scaffolding
        run: flutter create --platforms=ios --org=com.client --project-name=tournament_mobile .
      - name: Install Flutter dependencies
        run: flutter pub get
      - name: Analyze and test on macOS
        run: |
          flutter analyze --fatal-infos
          flutter test
      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update
      - name: Build unsigned release iOS application
        run: >-
          flutter build ios --release --no-codesign
          --dart-define=API_URL=https://api.example.invalid/api/v1
          --dart-define=WEBSOCKET_URL=https://api.example.invalid/live
          --dart-define=APP_NAME="${APP_NAME}"
      - name: Package unsigned iOS application
        run: ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app build/ios/iphoneos/Runner-unsigned.zip
      - name: Upload unsigned iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-${{ github.sha }}
          path: apps/mobile/build/ios/iphoneos/Runner-unsigned.zip
          if-no-files-found: error
          retention-days: 14

  docker-android-emulator:
    name: Docker stack and Android emulator
    needs: [android, ios]
    runs-on: ubuntu-24.04
    timeout-minutes: 70
    env:
      POSTGRES_DB: tournament
      POSTGRES_USER: tournament
      POSTGRES_PASSWORD: ci-only-database-password
      MINIO_ROOT_USER: ci-only-minio-user
      MINIO_ROOT_PASSWORD: ci-only-minio-password-value
      S3_BUCKET: tournament-media
      JWT_ACCESS_SECRET: ci-only-access-secret-at-least-thirty-two-characters
      CSRF_SECRET: ci-only-csrf-secret-at-least-thirty-two-characters
      TOKEN_ENCRYPTION_KEY: AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=
      SMTP_HOST: localhost
      SMTP_PORT: 2525
      SMTP_SECURE: 'false'
      SMTP_USER: ci-only-smtp-user
      SMTP_PASSWORD: ci-only-smtp-password
      SMTP_FROM: ci@example.invalid
      APP_VERSION: ci
      PRIMARY_COLOR: '#174A7E'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Complete deterministic Android scaffolding
        working-directory: apps/mobile
        run: flutter create --platforms=android --org=com.client --project-name=tournament_mobile .
      - name: Install Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get
      - name: Enable KVM for the Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Build and start the complete Docker stack
        run: docker compose up --build --detach --wait --wait-timeout 300
      - name: Verify API and admin frontend readiness
        run: |
          curl --fail --show-error --retry 20 --retry-delay 3 http://127.0.0.1:8080/api/v1/ready
          curl --fail --show-error --retry 20 --retry-delay 3 http://127.0.0.1:8080/
          docker compose ps
      - name: Run fan app against Docker on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          script: >-
            cd apps/mobile &&
            flutter test integration_test/docker_app_test.dart -d emulator-5554
            --dart-define=API_URL=http://10.0.2.2:8080/api/v1
            --dart-define=WEBSOCKET_URL=http://10.0.2.2:8080/live
            --dart-define=APP_NAME="Tournament Platform"
      - name: Capture Docker logs after failure
        if: failure()
        run: docker compose logs --no-color > docker-compose.log
      - name: Upload full-stack failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-full-stack-failure-${{ github.sha }}
          path: docker-compose.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Stop the Docker stack
        if: always()
        run: docker compose down --volumes --remove-orphans
