name: tournament-platform

services:
  postgres:
    image: postgres:16.9-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tournament}
      POSTGRES_USER: ${POSTGRES_USER:-tournament}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a local .env file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [internal]
    restart: unless-stopped

  redis:
    image: redis:7.4.4-bookworm
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1000']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [internal]
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in a local .env file}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in a local .env file}
    volumes:
      - minio_data:/data
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [internal]
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in a local .env file}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in a local .env file}
      S3_BUCKET: ${S3_BUCKET:-tournament-media}
    entrypoint: ['/bin/sh', '-c']
    command:
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${S3_BUCKET}" &&
        mc anonymous set none "local/$${S3_BUCKET}"
    networks: [internal]
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    environment: &api-environment
      NODE_ENV: development
      PORT: 4000
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tournament}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tournament}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET}
      JWT_ISSUER: tournament-platform
      JWT_AUDIENCE: tournament-clients
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_DAYS: 30
      COOKIE_NAME: tp_refresh
      COOKIE_SECURE: 'false'
      CSRF_SECRET: ${CSRF_SECRET:?Set CSRF_SECRET}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?Set TOKEN_ENCRYPTION_KEY}
      TRUSTED_ORIGINS: http://localhost:3000
      ADMIN_WEB_URL: http://localhost:3000
      PUBLIC_API_URL: http://localhost:8080/api/v1
      WEBSOCKET_URL: http://localhost:8080/live
      SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST or use a local SMTP catcher}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:?Set SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?Set SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:?Set SMTP_FROM}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-tournament-media}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: 'true'
      S3_PUBLIC_BASE_URL: http://localhost:9000/${S3_BUCKET:-tournament-media}
      MAX_UPLOAD_BYTES: 5242880
      NOTIFICATION_PROVIDER: noop
      MOBILE_MINIMUM_VERSION: 1.0.0
      MAINTENANCE_MODE: 'false'
      LOG_LEVEL: info
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_MAX: 120
      AUTH_RATE_LIMIT_MAX: 10
      DATA_RETENTION_DAYS: 2555
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    command: ['sh', '-c', './node_modules/.bin/prisma migrate deploy && node dist/src/main.js']
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [internal]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    environment: *api-environment
    command: ['node', 'dist/src/worker.js']
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [internal]
    restart: unless-stopped

  admin-web:
    build:
      context: .
      dockerfile: infrastructure/docker/admin-web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
        NEXT_PUBLIC_WEBSOCKET_URL: http://localhost:8080/live
        NEXT_PUBLIC_APP_NAME: ${APP_NAME:-Tournament Platform}
        NEXT_PUBLIC_PRIMARY_COLOR: ${PRIMARY_COLOR:-#174A7E}
    depends_on:
      api: { condition: service_healthy }
    networks: [internal]
    restart: unless-stopped

  nginx:
    image: nginx:1.27.5-alpine
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '127.0.0.1:8080:8080'
    depends_on:
      api: { condition: service_healthy }
      admin-web: { condition: service_started }
    networks: [internal]
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
